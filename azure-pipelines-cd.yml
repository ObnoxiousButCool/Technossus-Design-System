# ============================================================
# CD Pipeline — Technossus Website V2 (Web / Next.js)
# Azure Pipelines | Azure Static Web Apps
# Resource Group : RG-Technossus-WebV2
#
# Stages:
#   1. build      — next build (production)
#   2. staging    — deploy to SWA named preview environment (auto)
#   3. production — deploy to SWA production slot (approval gate)
#
# Pre-requisites (configure once in Azure DevOps):
#   • Pipeline secret variable  : AZURE_SWA_DEPLOYMENT_TOKEN
#     → Azure Portal › Static Web App › Manage Deployment Token
#   • Environment "WebV2-Staging"     (no approval needed)
#   • Environment "WebV2-Production"  → add Approvals & Checks › Required approvers
# ============================================================

# This pipeline is triggered by a successful run of the CI pipeline on main,
# not by direct code pushes (CI already validates the code).
trigger: none

resources:
  pipelines:
    - pipeline: Technossus-WebsiteV2-Web
      # Must match the pipeline name shown in Azure DevOps Pipelines list.
      # Rename the CI pipeline to "Technossus-WebsiteV2-Web CI" in the portal
      # or update this value to match whatever name you chose.
      source: 'Technossus-WebsiteV2-Web CI'
      trigger:
        branches:
          include:
            - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'

# ─────────────────────────────────────────────
# STAGE 1 — Build
# ─────────────────────────────────────────────
stages:
  - stage: Build
    displayName: '1 · Build (production)'
    jobs:
      - job: NextBuild
        displayName: 'next build'
        steps:
          - checkout: self
            fetchDepth: 1

          - task: NodeTool@0
            displayName: 'Install Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: npm ci --prefer-offline
            displayName: 'Install dependencies (clean install)'

          - script: npm run build
            displayName: 'Build Next.js application'
            env:
              NODE_ENV: production

          # Publish the full workspace (source + .next) so that
          # AzureStaticWebApp@0 can reference both the app root and
          # the pre-built output in downstream stages.
          - task: PublishPipelineArtifact@1
            displayName: 'Publish build artifact'
            inputs:
              targetPath: '$(Build.SourcesDirectory)'
              artifact: 'nextjs-app'
              publishLocation: pipeline

  # ─────────────────────────────────────────────
  # STAGE 2 — Deploy to Staging
  # ─────────────────────────────────────────────
  - stage: DeployStaging
    displayName: '2 · Deploy → Staging'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: StagingDeploy
        displayName: 'Azure Static Web Apps — staging preview'
        # No approval gate on this environment — deploys automatically.
        # Configure in Azure DevOps › Pipelines › Environments › WebV2-Staging.
        environment: 'WebV2-Staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: nextjs-app
                  displayName: 'Download build artifact'

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy to SWA staging environment'
                  inputs:
                    # Deployment token from RG-Technossus-WebV2 Static Web App
                    azure_static_web_apps_api_token: $(AZURE_SWA_DEPLOYMENT_TOKEN)
                    action: upload
                    # Full Next.js project root (source + .next inside the artifact)
                    app_location: '$(Pipeline.Workspace)/nextjs-app'
                    # Pre-built .next folder — skip rebuilding on the SWA agent
                    output_location: '.next'
                    skip_app_build: true
                    # Named SWA preview environment (creates <hash>-staging.<domain>.azurestaticapps.net)
                    deployment_environment: staging
                    production_branch: main

  # ─────────────────────────────────────────────
  # STAGE 3 — Deploy to Production
  # ─────────────────────────────────────────────
  - stage: DeployProduction
    displayName: '3 · Deploy → Production'
    dependsOn: DeployStaging
    # Only deploy to production from the main branch and after staging succeeds.
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: ProductionDeploy
        displayName: 'Azure Static Web Apps — production'
        # Add required approvers in Azure DevOps › Pipelines › Environments
        # › WebV2-Production › Approvals and Checks.
        environment: 'WebV2-Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: nextjs-app
                  displayName: 'Download build artifact'

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy to SWA production slot'
                  inputs:
                    azure_static_web_apps_api_token: $(AZURE_SWA_DEPLOYMENT_TOKEN)
                    action: upload
                    app_location: '$(Pipeline.Workspace)/nextjs-app'
                    output_location: '.next'
                    skip_app_build: true
                    # No deployment_environment → targets the production slot
                    production_branch: main
